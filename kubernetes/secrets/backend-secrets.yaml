# ─── Backend API Secrets ─────────────────────────────────────────────────────
# Bushido Brand — K8s Secret manifests for the Flask backend API
#
# These secrets are referenced by the Helm chart at:
#   bushido-brand-pipeline/gitops-repo/charts/backend/templates/deployment.yaml
#
# Apply:
#   kubectl apply -f kubernetes/secrets/backend-secrets.yaml -n bushido-brand
# ─────────────────────────────────────────────────────────────────────────────

---
apiVersion: v1
kind: Secret
metadata:
  name: backend-database-url
  namespace: bushido-brand
  labels:
    app.kubernetes.io/name: backend
    app.kubernetes.io/part-of: bushido-brand
    app.kubernetes.io/managed-by: kubectl
type: Opaque
stringData:
  # MySQL connection string for SQLAlchemy
  # user: bushido_user  (matches mysql-user-password secret)
  database-url: "mysql+pymysql://bushido_user:5d30eeda4fc41abf15af94d418104455@db/bushido_db"

---
apiVersion: v1
kind: Secret
metadata:
  name: backend-secret-key
  namespace: bushido-brand
  labels:
    app.kubernetes.io/name: backend
    app.kubernetes.io/part-of: bushido-brand
    app.kubernetes.io/managed-by: kubectl
type: Opaque
stringData:
  # Flask SECRET_KEY for session signing and CSRF protection
  secret-key: "n9KbSCE/qffirMnJfy2xUmu2dPX2zKv5XLbnKQfvWuw="

---
apiVersion: v1
kind: Secret
metadata:
  name: backend-jwt-secret-key
  namespace: bushido-brand
  labels:
    app.kubernetes.io/name: backend
    app.kubernetes.io/part-of: bushido-brand
    app.kubernetes.io/managed-by: kubectl
type: Opaque
stringData:
  # JWT_SECRET_KEY for signing and verifying authentication tokens
  jwt-secret-key: "5bc13eq34E6euCYEgq8lng=="
