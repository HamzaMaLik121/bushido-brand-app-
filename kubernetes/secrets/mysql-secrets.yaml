# ─── MySQL Database Secrets ──────────────────────────────────────────────────
# Bushido Brand — K8s Secret manifests for the MySQL 8.0 database tier
#
# These secrets are referenced by the Helm chart at:
#   bushido-brand-pipeline/gitops-repo/charts/db/templates/statefulset.yaml
#
# Apply:
#   kubectl apply -f kubernetes/secrets/mysql-secrets.yaml -n bushido-brand
# ─────────────────────────────────────────────────────────────────────────────

---
apiVersion: v1
kind: Secret
metadata:
  name: mysql-root-password
  namespace: bushido-brand
  labels:
    app.kubernetes.io/name: db
    app.kubernetes.io/part-of: bushido-brand
    app.kubernetes.io/managed-by: kubectl
type: Opaque
