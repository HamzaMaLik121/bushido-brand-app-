# kind-config.yaml
# ─────────────────────────────────────────────────────────────────────────────
# KIND Cluster Configuration
# 1 control-plane + 3 worker nodes with port mappings for local dev
# ─────────────────────────────────────────────────────────────────────────────

kind: Cluster
apiVersion: kind.x-k8s.io/v1alpha4

name: bushido-brand

nodes:
  # ─── Control Plane ────────────────────────────────────────────────────
  - role: control-plane
    extraPortMappings:
      # Jenkins UI (NodePort 32000 → localhost:32000)
      - containerPort: 32000
        hostPort: 32000
        protocol: TCP
      # ArgoCD UI (NodePort 30080 → localhost:30080)
      - containerPort: 30080
        hostPort: 30080
        protocol: TCP

  # ─── Worker Node 1 (backend + db) ────────────────────────────────────
  - role: worker
    extraPortMappings:
      - containerPort: 80
        hostPort: 80
        protocol: TCP
      - containerPort: 443
        hostPort: 443
        protocol: TCP

  # ─── Worker Node 2 (frontend) ─────────────────────────────────────────
  - role: worker

  # ─── Worker Node 3 (Jenkins agents / CI workloads) ──────────────────
  - role: worker
