# jenkins-values.yaml
# ─────────────────────────────────────────────────────────────────────────────
# Jenkins Helm Chart Values for KIND Cluster
# ─────────────────────────────────────────────────────────────────────────────

# ─── Ingress (disabled — using NodePort on KIND) ────────────────────────────
ingress:
  enabled: false

# ─── Persistence ────────────────────────────────────────────────────────────
persistence:
  enabled: true
  size: 10Gi
  # KIND default storage class
  storageClass: standard

# ─── Admin User ─────────────────────────────────────────────────────────────
adminUser: admin
# Password will be auto-generated and printed in logs if not set.
# Set a known password here for convenience (change in production):
# adminPassword: admin123

# ─── Plugins ────────────────────────────────────────────────────────────────
controller:
  # ─── Service (NodePort for local KIND access) ───────────────────────────
  serviceType: NodePort
  servicePort: 8080
  nodePort: 32000

  image:
    # Jenkins LTS version
    tag: "lts-jdk21"

  # Install additional plugins
  # Note: Versions omitted — the plugin-installation-manager-tool resolves
  # the latest compatible versions for the Jenkins LTS release being used.
  installPlugins:
    - "kubernetes"               # Dynamic Kubernetes agents
    - "workflow-aggregator"      # Pipeline + stages
    - "git"                      # Git SCM
    - "configuration-as-code"    # JCasC
    - "blueocean"                # Blue Ocean UI
    - "blueocean-autofavorite"   # Auto-favorite in Blue Ocean
    - "pipeline-stage-view"      # Stage view
    - "pipeline-graph-analysis"  # Pipeline graph
    - "credentials-binding"      # Credentials binding
    - "docker-workflow"          # Docker pipeline steps
    - "docker-plugin"            # Docker integration
    - "sonar"                    # SonarQube scanner
    - "dependency-check-jenkins-plugin" # OWASP dependency check
    - "slack"                    # Slack notifications
    - "htmlpublisher"            # HTML report publisher
    - "timestamper"              # Timestamps in console
    - "ws-cleanup"               # Workspace cleanup

  # ─── Resource Limits ──────────────────────────────────────────────────────
  resources:
    requests:
      cpu: "500m"
      memory: "1Gi"
    limits:
      cpu: "2"
      memory: "4Gi"

  # ─── Java Options ─────────────────────────────────────────────────────────
  javaOpts: >-
    -Xms512m
    -Xmx2048m
    -Djenkins.install.runSetupWizard=false
    -Dhudson.model.DirectoryBrowserSupport.CSP=

  # ─── Init Container (downloads plugins — needs enough heap) ─────────────
  initContainerResources:
    requests:
      cpu: "500m"
      memory: "1Gi"
    limits:
      cpu: "1"
      memory: "2Gi"

  # ─── No custom sidecars — DinD runs in agent pods, not the controller ──
  # Docker-in-Docker is configured in the JCasC agent pod template below
# ─── Agent (disabled — using JCasC for full control) ────────────────────────
agent:
  enabled: false

# ─── JCasC (Jenkins Configuration as Code) ──────────────────────────────────
JCasC:
  enabled: true
  configScripts:
    welcome-message: |
      jenkins:
        systemMessage: "Bushido Brand CI/CD — Local KIND Cluster\n\nAll pipelines run on dynamic Kubernetes pods."
    kubernetes-cloud: |
      jenkins:
        clouds:
          - kubernetes:
              name: "kubernetes"
              namespace: "jenkins"
              serverUrl: "https://kubernetes.default.svc"
              skipTlsVerify: true
              connectTimeout: 60
              readTimeout: 60
              templates:
                - name: "docker-agent"
                  label: "docker-agent"
                  namespace: "jenkins"
                  hostNetwork: false
                  containers:
                    - name: "jnlp"
                      image: "jenkins/inbound-agent:3261.v9c670a_4748a_9-1-jdk17"
                      args: "${computer.jnlpmac} ${computer.name}"
                      resourceRequestCpu: "500m"
                      resourceRequestMemory: "512Mi"
                      resourceLimitCpu: "2"
                      resourceLimitMemory: "2Gi"
                      workingDir: "/home/jenkins/agent"
                    # DinD daemon — each agent gets its own Docker daemon
                    - name: "dind"
                      image: "docker:27.5.1-dind"
                      securityContext:
                        privileged: true
                      envVars:
                        - envVar:
                            key: "DOCKER_TLS_CERTDIR"
                            value: ""
                      resourceRequestCpu: "200m"
                      resourceRequestMemory: "512Mi"
                      resourceLimitCpu: "1"
                      resourceLimitMemory: "2Gi"
                    # Docker CLI — connects to the local DinD sidecar
                    - name: "docker"
                      image: "docker:27.5.1-cli"
                      command: "sleep"
                      args: "infinity"
                      resourceRequestCpu: "100m"
                      resourceRequestMemory: "128Mi"
                      envVars:
                        - envVar:
                            key: "DOCKER_HOST"
                            value: "tcp://localhost:2375"
                    - name: "trivy"
                      image: "aquasec/trivy:0.58.2"
                      command: "sleep"
                      args: "infinity"
                      resourceRequestCpu: "200m"
                      resourceRequestMemory: "256Mi"
                    - name: "yq"
                      image: "mikefarah/yq:4.45.1"
                      command: "sleep"
                      args: "infinity"
                      resourceRequestCpu: "100m"
                      resourceRequestMemory: "128Mi"
                    - name: "argocd"
                      image: "argoproj/argocd:v2.14.0"
                      command: "sleep"
                      args: "infinity"
                      resourceRequestCpu: "100m"
                      resourceRequestMemory: "128Mi"
                    - name: "sonar"
                      image: "sonarsource/sonar-scanner-cli:11.2.0"
                      command: "sleep"
                      args: "infinity"
                      resourceRequestCpu: "200m"
                      resourceRequestMemory: "256Mi"
                  volumes:
                    - emptyDirVolume:
                        memory: false
                        mountPath: "/home/jenkins/.m2"
                    - emptyDirVolume:
                        memory: false
                        mountPath: "/home/jenkins/.gradle"
                  envVars:
                    - envVar:
                        key: "DOCKER_HOST"
                        value: "tcp://localhost:2375"
                  idleMinutes: 5
                  yamlMergeStrategy: "override"
                # Note: agent.podTemplates is NOT used here — we define
                # the single source of truth via JCasC above to avoid duplicates.
