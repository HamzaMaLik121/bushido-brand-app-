# Base SonarQube Scanner configuration file for Bushido Brand
# This registers standard global settings. Project keys are overwritten by Jenkins execution parameters.
#
# Location: devsecops/sonarqube/sonar-project.properties
# Copy to project root or reference from CI pipeline execution environment.

sonar.sources=.
sonar.sourceEncoding=UTF-8

# Ignore dependency libraries, tests, mocks, and auto-generated classes from analysis
sonar.exclusions=  **/vendor/**,  **/node_modules/**,  **/*.test.*,  **/*.spec.*,  **/test/**,  **/tests/**,  **/__mocks__/**,  **/mock*/**,  **/generated/**,  **/*.pb.go

# Code coverage report path placeholders
# Uncomment and adjust paths when code coverage is integrated:
# sonar.go.coverage.reportPaths=coverage.out
# sonar.javascript.lcov.reportPaths=coverage/lcov.info
# sonar.python.coverage.reportPaths=coverage.xml
