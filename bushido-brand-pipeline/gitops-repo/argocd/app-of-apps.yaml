# ─── ArgoCD App of Apps Bootstrapper ──────────────────────────────────────────
# Bootstrapping pattern for microservices. Registering this root configuration 
# allows ArgoCD to discover and manage all nested application manifests defined
# inside argocd/apps/ automatically.
#
# Usage:
# kubectl apply -f argocd/app-of-apps.yaml
# ─────────────────────────────────────────────────────────────────────────────

apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: bushido-brand-root-application
  namespace: argocd
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: bushido-brand
  source:
    repoURL: https://github.com/HamzaMaLik121/bushido-brand-app-.git
    targetRevision: main
    path: bushido-brand-pipeline/gitops-repo/argocd/apps
  destination:
    server: https://kubernetes.default.svc
    namespace: argocd
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - PrunePropagationPolicy=foreground
      - PruneLast=true
