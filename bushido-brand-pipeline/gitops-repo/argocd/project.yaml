apiVersion: argoproj.io/v1alpha1
kind: AppProject
metadata:
  name: bushido-brand
  namespace: argocd
spec:
  description: "bushido-brand application delivery space - managed via ArgoCD GitOps"
  sourceRepos:
    - "https://github.com/HamzaMaLik121/bushido-brand-app-.git"
  destinations:
    - server: "https://kubernetes.default.svc"
      namespace: "bushido-brand"

  # Limit resource provisioning to Namespace creation at the cluster level
  clusterResourceWhitelist:
    - group: ""
      kind: Namespace

  # Permitted namespace objects (includes stateful and storage resources for db tier)
  namespaceResourceWhitelist:
    - group: "apps"
      kind: Deployment
    - group: "apps"
      kind: StatefulSet
    - group: ""
      kind: Service
    - group: ""
      kind: ConfigMap
    - group: ""
      kind: Secret
    - group: ""
      kind: ServiceAccount
    - group: ""
      kind: PersistentVolumeClaim
    - group: "autoscaling"
      kind: HorizontalPodAutoscaler

  # Drift monitoring tracking resources that escape Git definition control
  orphanedResources:
    warn: true

  # Custom pipeline access control policy
  roles:
    - name: pipeline
      description: API user used by Jenkins runner to synchronize application states.
      policies:
        - p, proj:bushido-brand:pipeline, applications, sync, bushido-brand/*, allow
        - p, proj:bushido-brand:pipeline, applications, get,  bushido-brand/*, allow
