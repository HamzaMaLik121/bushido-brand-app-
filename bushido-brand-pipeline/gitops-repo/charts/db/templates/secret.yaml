# ─── Database Secrets ─────────────────────────────────────────────────────────
# This template documents the required Secret resources for MySQL authentication.
# The actual secrets should be created externally
# (via sealed-secrets, external-secrets, or manually).
#
# Example creation:
#   kubectl create secret generic mysql-root-password \
#     --from-literal=password='<your-root-password>'
#   kubectl create secret generic mysql-user-password \
#     --from-literal=password='<your-user-password>'
# ─────────────────────────────────────────────────────────────────────────────
{{- if .Values.secrets.create }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ .Values.database.rootPasswordSecret }}
  labels:
    {{ include "db.labels" . | nindent 4 }}
type: Opaque
stringData:
  password: {{ .Values.secrets.rootPassword | quote }}
---
apiVersion: v1
kind: Secret
metadata:
  name: {{ .Values.database.userPasswordSecret }}
  labels:
    {{ include "db.labels" . | nindent 4 }}
type: Opaque
stringData:
  password: {{ .Values.secrets.userPassword | quote }}
{{- end }}
