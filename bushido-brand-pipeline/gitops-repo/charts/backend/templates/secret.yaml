# ─── Backend Secrets ──────────────────────────────────────────────────────────
# This template documents the required Secret resources that must exist in the
# namespace before the backend deployment can start. The actual secrets should
# be created externally (via sealed-secrets, external-secrets, or manually).
#
# Example creation:
#   kubectl create secret generic backend-database-url   --from-literal=database-url='mysql+pymysql://user:pass@db/bushido_db'
#   kubectl create secret generic backend-secret-key     --from-literal=secret-key='change-me'
#   kubectl create secret generic backend-jwt-secret-key --from-literal=jwt-secret-key='change-me'
# ─────────────────────────────────────────────────────────────────────────────
{{- if .Values.secrets.create }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ .Values.databaseUrlSecret }}
  labels:
    {{ include "backend.labels" . | nindent 4 }}
type: Opaque
stringData:
  database-url: {{ .Values.secrets.databaseUrl | quote }}
---
apiVersion: v1
kind: Secret
metadata:
  name: {{ .Values.secretKeySecret }}
  labels:
    {{ include "backend.labels" . | nindent 4 }}
type: Opaque
stringData:
  secret-key: {{ .Values.secrets.secretKey | quote }}
---
apiVersion: v1
kind: Secret
metadata:
  name: {{ .Values.jwtSecretKeySecret }}
  labels:
    {{ include "backend.labels" . | nindent 4 }}
type: Opaque
stringData:
  jwt-secret-key: {{ .Values.secrets.jwtSecretKey | quote }}
{{- end }}
