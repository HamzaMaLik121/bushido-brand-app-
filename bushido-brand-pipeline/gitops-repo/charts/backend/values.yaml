# ─── Replica & Scaling ────────────────────────────────────────────────────────
replicaCount: 2

# ─── Image ────────────────────────────────────────────────────────────────────
image:
  repository: bushidobrand/bushido-brand-backend
  tag: latest                                    # ← bumped automatically on every main push
  pullPolicy: IfNotPresent

# ─── Service ──────────────────────────────────────────────────────────────────
service:
  type: ClusterIP
  port: 80
  targetPort: 5000

# ─── Resources ────────────────────────────────────────────────────────────────
resources:
  requests:
    cpu: 100m
    memory: 128Mi
  limits:
    cpu: 500m
    memory: 512Mi

# ─── Autoscaling ──────────────────────────────────────────────────────────────
autoscaling:
  enabled: true
  minReplicas: 2
  maxReplicas: 5
  targetCPUUtilizationPercentage: 70

# ─── Health Checks ────────────────────────────────────────────────────────────
livenessProbe:
  httpGet:
    path: /api/health
    port: 5000
  initialDelaySeconds: 30
  periodSeconds: 10
  failureThreshold: 3

readinessProbe:
  httpGet:
    path: /api/health
    port: 5000
  initialDelaySeconds: 10
  periodSeconds: 5
  failureThreshold: 3

# ─── Security ─────────────────────────────────────────────────────────────────
# Non-root compliance configs matching security standards
podSecurityContext:
  runAsNonRoot: true
  runAsUser: 1000
  fsGroup: 2000

containerSecurityContext:
  allowPrivilegeEscalation: false
  readOnlyRootFilesystem: true
  capabilities:
    drop:
      - ALL

# ─── Secrets ─────────────────────────────────────────────────────────────────
# Names of K8s Secret resources containing the backend configuration.
# These secrets must exist in the namespace before deploying.
databaseUrlSecret: backend-database-url
secretKeySecret: backend-secret-key
jwtSecretKeySecret: backend-jwt-secret-key
flaskEnv: production

# If secrets.create is true, these values are used to create secrets inline
# (not recommended for production — use external tools like sealed-secrets instead).
secrets:
  create: false
  databaseUrl: "mysql+pymysql://root:rootpassword@db/bushido_db"
  secretKey: "bushido-secret-key-2026"
  jwtSecretKey: "bushido-jwt-secret"

# ─── Ingress ──────────────────────────────────────────────────────────────────
ingress:
  enabled: false
  className: nginx
  host: api.bushidobrand.com
  tls:
    enabled: false
    secretName: backend-tls

# ─── Misc ─────────────────────────────────────────────────────────────────────
podAnnotations: {}
nodeSelector: {}
tolerations: []
affinity: {}
