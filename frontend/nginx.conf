server {
    listen 80;
    server_name localhost;

    root /usr/share/nginx/html/src/pages;
    index index.html;

    # Gzip
    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml overflow/xml overflow/xml+rss text/javascript;

    # Assets routing (since pages are in src/pages, we need to point to siblings for css/js)
    location /css/ {
        alias /usr/share/nginx/html/src/css/;
    }

    location /js/ {
        alias /usr/share/nginx/html/src/js/;
    }

    location /assets/ {
        alias /usr/share/nginx/html/src/assets/;
    }

    # API Proxy
    location /api/ {
        proxy_pass http://backend:5000/api/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    location / {
        try_files $uri $uri/ /index.html;
    }
}
