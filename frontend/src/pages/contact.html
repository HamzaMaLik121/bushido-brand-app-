<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SIGNAL | BUSHIDO</title>
    <link rel="stylesheet" href="../css/main.css">
    <link rel="stylesheet" href="../css/navbar.css">
    <link rel="stylesheet" href="../css/responsive.css">
    <link href="https://fonts.googleapis.com/css2?family=Syncopate:wght@400;700&family=Inter:wght@300;400;700&display=swap" rel="stylesheet">
    <style>
        .contact-form { max-width: 600px; margin: 40px auto; background: var(--bg-sec); padding: 40px; border: 1px solid rgba(255,255,255,0.05); }
        input, textarea { width: 100%; background: var(--bg-main); border: 1px solid rgba(255,255,255,0.1); padding: 15px; color: white; margin-bottom: 20px; }
        input:focus, textarea:focus { border-color: var(--accent); outline: none; }
    </style>
</head>
<body>
    <nav class="navbar">
        <div class="container nav-content">
            <div class="logo">武士道</div>
            <ul class="nav-links">
                <li><a href="index.html">HOME</a></li>
                <li><a href="products.html">ARMORY</a></li>
                <li><a href="about.html">STORY</a></li>
                <li><a href="contact.html" class="active">SIGNAL</a></li>
            </ul>
        </div>
    </nav>

    <main class="py-lg container">
        <h1 class="text-center">SEND A SIGNAL</h1>
        <form class="contact-form" id="contact-form">
            <input type="text" id="name" placeholder="NAME" required>
            <input type="email" id="email" placeholder="EMAIL" required>
            <input type="text" id="subject" placeholder="SUBJECT">
            <textarea id="message" rows="5" placeholder="MESSAGE" required></textarea>
            <button type="submit" class="btn btn-primary w-100">TRANSMIT</button>
        </form>
    </main>

    <script src="../js/api.js"></script>
    <script>
        document.getElementById('contact-form').onsubmit = async (e) => {
            e.preventDefault();
            const data = {
                name: document.getElementById('name').value,
                email: document.getElementById('email').value,
                subject: document.getElementById('subject').value,
                message: document.getElementById('message').value
            };
            try {
                const res = await api.post('/contact/', data);
                if (res.message) {
                    alert('SIGNAL RECEIVED. THE CLAN WILL RESPOND.');
                    e.target.reset();
                }
            } catch (err) {
                alert('SIGNAL LOST. TRY AGAIN.');
            }
        };
    </script>
</body>
</html>
